<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>تقرير الزيارات</title>
</head>

<body>

<h2>تقرير الزيارات من SharePoint</h2>

<button onclick="loadFromSharePoint()">📥 تحميل البيانات</button>

<ul id="list"></ul>

<script>

const SP_SITE = "https://moeom.sharepoint.com/sites/younis";
const SP_LIST = "Visits";

// ✅ دالة واحدة فقط لجلب البيانات
async function loadFromSharePoint() {

    const url = `${SP_SITE}/_api/web/lists/getbytitle('${SP_LIST}')/items`;

    try {
        const res = await fetch(url, {
            method: "GET",
            headers: {
                "Accept": "application/json;odata=nometadata"
            }
        });

        const data = await res.json();

        // عرض البيانات
        const list = document.getElementById("list");
        list.innerHTML = "";

        data.value.forEach(item => {
            const li = document.createElement("li");
            li.textContent =
                item.ActualSchool + " - عدد الزيارات: " + item.class_visit_count;
            list.appendChild(li);
        });

        // حفظها لاستخدام لاحق
        window.spData = data.value;

        console.log(data.value);

        alert("✅ تم تحميل البيانات");

    } catch (err) {
        console.error(err);
        alert("❌ فشل تحميل البيانات");
    }
}

</script>

</body>
</html>
