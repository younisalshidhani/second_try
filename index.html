<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>تقرير الزيارات</title>
</head>

<body>

<h2>تقرير الزيارات من SharePoint</h2>

<button onclick="loadFromSharePoint()">📥 تحميل البيانات</button>

<ul id="list"></ul>

<script>

const SP_SITE = "https://moeom.sharepoint.com/sites/younis";
const SP_LIST = "Visits";

// ✅ دالة جلب البيانات من Power Automate
async function loadFromSharePoint() {

    try {
        const res = await fetch("data.json");
        const items = await res.json();

        const list = document.getElementById("list");
        list.innerHTML = "";

        items.forEach(item => {
            const li = document.createElement("li");
            const dateObj = new Date(item.date);
const day = dateObj.toLocaleDateString('ar', { weekday: 'long' });

li.textContent =
    day + " - " +
    item.ActualSchool +
    " - عدد الزيارات: " +
    item.class_visit_count;

            list.appendChild(li);
        });

        window.spData = items;

        alert("✅ تم تحميل البيانات");

    } catch (err) {
        console.error(err);
        alert("❌ فشل تحميل البيانات");
    }
}

</script>

</body>
</html>
