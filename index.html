<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>تقرير الزيارات</title>
</head>

<body>

<h2>تقرير الزيارات من SharePoint</h2>

<button onclick="loadFromSharePoint()">📥 تحميل البيانات</button>

<table border="1" style="width:100%; text-align:center" id="table">
  <thead>
    <tr>
      <th rowspan="2">التاريخ</th>
      <th rowspan="2">اليوم</th>
      <th rowspan="2">الخطة الشهرية</th>
      <th rowspan="2">الخطة المنفذة</th>
      <th colspan="2">توثيق الزيارات</th>
      <th rowspan="2">الأساليب الإشرافية</th>
      <th rowspan="2">متابعة إلكترونية</th>
      <th rowspan="2">معلم يحتاج متابعة</th>
    </tr>
    <tr>
      <th>زيارة مدرسية</th>
      <th>عدد الزيارات</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<br><br>
<button onclick="generateWord()">📄 توليد Word</button>

<script>

// ✅ متغير عام
let items = [];

async function loadFromSharePoint() {

    const res = await fetch("data.json");
    items = await res.json();

    const table = document.querySelector("#table tbody");
    table.innerHTML = "";

    let totalVisits = 0;

    items.forEach(item => {

        const d = new Date(item.date);
        const day = d.toLocaleDateString('ar', { weekday: 'long' });
        const date = d.toLocaleDateString('ar');

        totalVisits += item.class_visit_count;

        table.innerHTML += `
        <tr>
            <td>${date}</td>
            <td>${day}</td>
            <td>${item.planned || ""}</td>
            <td>${item.actual || ""}</td>
            <td>${item.visit_done ? "✓" : ""}</td>
            <td>${item.class_visit_count || 0}</td>
            <td>${item.methods || ""}</td>
            <td>${item.need_followup ? "✓" : ""}</td>
            <td>${item.teacher_followup || ""}</td>
        </tr>
        `;
    });

    table.innerHTML += `
    <tr>
        <td colspan="5"><b>المجموع</b></td>
        <td><b>${totalVisits}</b></td>
        <td colspan="3"></td>
    </tr>
    `;
}

function generateWord() {

    if (items.length === 0) {
        alert("❗ اضغط تحميل البيانات أولاً");
        return;
    }

    let rowsHTML = "";
    let totalVisits = 0;
    let workedDays = 0;

    items.forEach(item => {

        const d = new Date(item.date);
        const day = d.toLocaleDateString('ar', { weekday: 'long' });
        const date = d.toLocaleDateString('ar');

        const visits = item.class_visit_count || 0;
        totalVisits += visits;

        if (visits > 0) workedDays++;

        rowsHTML += `
        <tr>
            <td>${date}</td>
            <td>${day}</td>
            <td>${item.planned || ""}</td>
            <td>${item.actual || ""}</td>
            <td>${item.visit_done ? "✔" : ""}</td>
            <td>${visits}</td>
            <td>${item.methods || ""}</td>
            <td>${item.need_followup ? "✔" : ""}</td>
            <td>${item.teacher_followup || ""}</td>
        </tr>
        `;
    });

    const percent = Math.round((workedDays / 30) * 100);

    const html = `
    <html xmlns:o='urn:schemas-microsoft-com:office:office'
    xmlns:w='urn:schemas-microsoft-com:office:word'>
    <head>
    <meta charset="UTF-8">
    <style>
        body { font-family: Arial; direction: rtl; }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid black;
            padding: 6px;
            text-align: center;
            font-size: 14px;
        }

        h2 { text-align: center; }

        .header {
            text-align: center;
            margin-bottom: 10px;
        }
    </style>
    </head>

    <body>

    <h2>تقرير الزيارات الشهرية للمشرف التربوي</h2>

    <div class="header">
        <b>الاسم:</b> يونس بن ناصر الشيذاني
        &nbsp;&nbsp;
        <b>المادة:</b> فيزياء
        &nbsp;&nbsp;
        <b>الشهر:</b> يونيو
        &nbsp;&nbsp;
        <b>العام الدراسي:</b> 2025/2026
    </div>

    <table>

    <tr>
        <th rowspan="2">التاريخ</th>
        <th rowspan="2">اليوم</th>
        <th rowspan="2">الخطة الشهرية</th>
        <th rowspan="2">الخطة المنفذة</th>
        <th colspan="2">توثيق الزيارات</th>
        <th rowspan="2">الأساليب الإشرافية</th>
        <th rowspan="2">متابعة إلكترونية</th>
        <th rowspan="2">معلم يحتاج متابعة</th>
    </tr>
    <tr>
        <th>زيارة مدرسية</th>
        <th>عدد الزيارات</th>
    </tr>

    ${rowsHTML}

    <tr>
        <td colspan="5"><b>المجموع</b></td>
        <td><b>${totalVisits}</b></td>
        <td colspan="3"></td>
    </tr>

    </table>

    <br><br>

    <p>
    نسبة الإنجاز = (${workedDays} / 30) × 100 = <b>${percent}%</b>
    </p>

    <br><br>

    <p style="text-align:center;">
    يعتمد<br><br>
    المشرف | المشرف الأول | رئيس القسم
    </p>

    </body>
    </html>
    `;

    const blob = new Blob(['\ufeff', html], {
        type: 'application/msword'
    });

    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "تقرير_رسمي.doc";
    a.click();
}
</script>

</body>
</html>
