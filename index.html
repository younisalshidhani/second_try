<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>تقرير الزيارات</title>
</head>

<body>

<h2>تقرير الزيارات من SharePoint</h2>

<button onclick="loadFromSharePoint()">📥 تحميل البيانات</button>

<table border="1" style="width:100%; text-align:center" id="table">
  <thead>
    <tr>
      <th>التاريخ</th>
      <th>اليوم</th>
      <th>الخطة الشهرية</th>
      <th>الخطة المنفذة</th>
      <th>زيارة مدرسية</th>
      <th>عدد الزيارات</th>
      <th>الأساليب الإشرافية</th>
      <th>متابعة إلكترونية</th>
      <th>معلم يحتاج متابعة</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>
<br><br>
<button onclick="generateWord()">📄 توليد Word</button>
``
<script>

const SP_SITE = "https://moeom.sharepoint.com/sites/younis";
const SP_LIST = "Visits";

// ✅ دالة جلب البيانات من Power Automate
async function loadFromSharePoint() {

    try {
        const res = await fetch("data.json");
        const items = await res.json();

const table = document.querySelector("#table tbody");
table.innerHTML = "";

let totalVisits = 0;

items.forEach(item => {

    const dateObj = new Date(item.date);
    const day = dateObj.toLocaleDateString('ar', { weekday: 'long' });
    const date = dateObj.toLocaleDateString('ar');

    totalVisits += item.class_visit_count;

    const row = document.createElement("tr");

    row.innerHTML = `
        <td>${date}</td>
        <td>${day}</td>
        <td>${item.planned || ""}</td>
        <td>${item.actual || ""}</td>
        <td>${item.visit_done ? "✓" : ""}</td>
        <td>${item.class_visit_count || 0}</td>
        <td>${item.methods || ""}</td>
        <td>${item.need_followup ? "✓" : ""}</td>
        <td>${item.teacher_followup || ""}</td>
    `;

    table.appendChild(row);
});

// ✅ صف المجموع
const totalRow = document.createElement("tr");

totalRow.innerHTML = `
    <td colspan="5"><b>المجموع</b></td>
    <td><b>${totalVisits}</b></td>
    <td colspan="3"></td>
`;

table.appendChild(totalRow);
        


        window.spData = items;

        alert("✅ تم تحميل البيانات");

    } catch (err) {
        console.error(err);
        alert("❌ فشل تحميل البيانات");
    }
}
function generateWord() {

    let rowsHTML = "";
    let totalVisits = 0;
    let workedDays = 0;

    items.forEach(item => {

        const dateObj = new Date(item.date);
        const day = dateObj.toLocaleDateString('ar', { weekday: 'long' });
        const date = dateObj.toLocaleDateString('ar');

        const visits = item.class_visit_count || 0;
        totalVisits += visits;

        if (visits > 0) workedDays++;

        rowsHTML += `
        <tr>
            <td>${date}</td>
            <td>${day}</td>
            <td>${item.planned || ""}</td>
            <td>${item.actual || ""}</td>
            <td>${item.visit_done ? "✔" : ""}</td>
            <td>${visits}</td>
            <td>${item.methods || ""}</td>
            <td>${item.need_followup ? "✔" : ""}</td>
            <td>${item.teacher_followup || ""}</td>
        </tr>
        `;
    });

    // ✅ حساب نسبة الإنجاز
    const totalDays = 30;
    const percent = Math.round((workedDays / totalDays) * 100);

    const html = `
    <html xmlns:o='urn:schemas-microsoft-com:office:office'
    xmlns:w='urn:schemas-microsoft-com:office:word'>
    <head>
    <meta charset="utf-8">
    <title>تقرير الزيارات</title>
    </head>

    <body dir="rtl" style="font-family:Arial;">

    <h2 style="text-align:center;">تقرير الزيارات الشهرية للمشرف التربوي</h2>

    <p style="text-align:center;">
    <b>الاسم:</b> يونس بن ناصر الشيذاني &nbsp;&nbsp;
    <b>المادة:</b> فيزياء &nbsp;&nbsp;
    <b>الشهر:</b> يونيو &nbsp;&nbsp;
    <b>العام الدراسي:</b> 2025/2026
    </p>

    <table border="1" style="width:100%; text-align:center; border-collapse:collapse;">
        <tr>
            <th>التاريخ</th>
            <th>اليوم</th>
            <th>الخطة الشهرية</th>
            <th>الخطة المنفذة</th>
            <th>زيارة مدرسية</th>
            <th>عدد الزيارات</th>
            <th>الأساليب الإشرافية</th>
            <th>متابعة إلكترونية</th>
            <th>معلم يحتاج متابعة</th>
        </tr>

        ${rowsHTML}

        <tr>
            <td colspan="5"><b>المجموع</b></td>
            <td><b>${totalVisits}</b></td>
            <td colspan="3"></td>
        </tr>

    </table>

    <br><br>

    <p>
    نسبة الإنجاز = (${workedDays} / ${totalDays}) × 100 = <b>${percent}%</b>
    </p>

    </body>
    </html>
    `;

    const blob = new Blob(['\ufeff', html], {
        type: 'application/msword'
    });

    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "تقرير_الزيارات.doc";
    a.click();
}

</script>

</body>
</html>
