<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>تقرير الزيارات</title>
</head>

<body>

<h2>تقرير الزيارات من SharePoint</h2>

<button onclick="loadFromSharePoint()">📥 تحميل البيانات</button>

<ul id="list"></ul>

<script>

const SP_SITE = "https://moeom.sharepoint.com/sites/younis";
const SP_LIST = "Visits";

// ✅ دالة جلب البيانات من Power Automate
async function loadFromSharePoint() {

    const url = "https://default04b4cb5dcc41401fbd9d4ca8a31a5c.2f.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/b9e5c971260c4eeabd2b17fec80fb0f9/triggers/manual/paths/invoke?api-version=1";

    try {
        const res = await fetch(url, {
    method: "POST",
    headers: {
        "Content-Type": "application/json"
    },
    body: "{}"
});


        const data = await res.json();

        // ✅ دعم الحالتين (Flow أو SharePoint)
        const items = data.value || data;

        // ✅ عرض البيانات
        const list = document.getElementById("list");
        if (list) {
            list.innerHTML = "";

            items.forEach(item => {
                const li = document.createElement("li");
                li.textContent =
                    (item.ActualSchool || "غير محدد") +
                    " - عدد الزيارات: " +
                    (item.class_visit_count || 0);
                list.appendChild(li);
            });
        }

        // ✅ حفظ البيانات للاستخدام لاحقًا
        window.spData = items;

        console.log("✅ البيانات:", items);

        alert("✅ تم تحميل البيانات");

    } catch (err) {
        console.error("❌ خطأ:", err);
        alert("❌ فشل تحميل البيانات");
    }
}

</script>

</body>
</html>
